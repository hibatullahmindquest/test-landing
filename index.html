<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifututor | Kecemerlangan Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --apple-blue: #0071e3; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .apple-blue { color: var(--apple-blue); }
        .btn-apple { background-color: var(--apple-blue); border-radius: 980px; padding: 12px 28px; color: white; transition: 0.3s; }
        .btn-apple:hover { background-color: #0077ed; }
        .text-tight { letter-spacing: -0.02em; }
    </style>
</head>
<body class="bg-[#f5f5f7] text-[#1d1d1f]">

    <!-- Hero Section -->
    <section class="bg-black text-white py-32 px-4 text-center">
        <div class="max-w-[980px] mx-auto">
            <h1 class="text-5xl md:text-7xl font-semibold mb-6 text-tight" data-aos="fade-up">Sifututor.</h1>
            <p class="text-2xl md:text-3xl font-normal text-slate-400 mb-10" data-aos="fade-up" data-aos-delay="200">Kecemerlangan pembelajaran bermula di sini.</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4" data-aos="fade-up" data-aos-delay="400">
                <a href="#pricing" class="btn-apple">Lihat Pakej</a>
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <section class="py-24 px-4">
        <div class="max-w-[980px] mx-auto grid md:grid-cols-2 gap-8">
            <div class="bg-white p-12 rounded-3xl" data-aos="fade-up">
                <h2 class="text-3xl font-semibold mb-4">Cikgu Pakar</h2>
                <p class="text-slate-500">Belajar dengan pendidik terbaik yang pakar dalam subjek masing-masing.</p>
            </div>
            <div class="bg-white p-12 rounded-3xl" data-aos="fade-up" data-aos-delay="200">
                <h2 class="text-3xl font-semibold mb-4">Nota Digital</h2>
                <p class="text-slate-500">Nota padat dan visual yang membantu anda faham lebih cepat.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 text-center text-slate-400 text-sm">
        <p>&copy; 2026 Sifututor. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({once: true});</script>
</body>
</html>
